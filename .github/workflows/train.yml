name: Train model

permissions:
  contents: write

concurrency:
  group: train-model
  cancel-in-progress: false

on:
  # 定时触发（UTC 时间 7:05 → 北京时间 15:05）
  schedule:
    - cron: '5 7 * * *'
  # 手动触发
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 120   # 增加超时时间，因为首次下载数据可能较慢

    steps:
      # 1. 检出代码（使用 GITHUB_TOKEN，已自动具有写入权限）
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      # 2. 设置 Python 环境
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 3. 缓存 pip 依赖（加速安装）
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 4. 缓存 Qlib 数据（避免重复下载，私有仓库缓存上限 2GB）
      - name: Cache Qlib data
        id: cache-qlib-data
        uses: actions/cache@v4
        with:
          path: |
            ~/.qlib
            ~/.cache/qlib
          key: qlib-data-v1-${{ runner.os }}

      # 5. 安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
          else
            echo "⚠️ 未找到 requirements.txt，仅安装 pyqlib"
            pip install pyqlib
          fi

      # 6. 下载 Qlib 数据（仅在缓存未命中时执行）
      # 使用官方推荐的模块方式，无需额外脚本
      - name: Download Qlib data
        if: steps.cache-qlib-data.outputs.cache-hit != 'true'
        run: |
          python -m qlib.run.get_data qlib_data --target_dir ~/.qlib/qlib_data/cn_data --region cn

      # 7. 检查是否需要训练（原项目逻辑）
      - name: Check if need to train
        id: need_train_check
        run: |
          echo "检查是否需要训练"
          cd ./roll && python ./roll.py train need_train > ../need_train_result.txt
          cd ..
          NEED_TRAIN=$(tail -n1 need_train_result.txt)
          echo "NEED_TRAIN_RESULT=$NEED_TRAIN" >> $GITHUB_ENV

      # 8. 如果不需要训练，提前退出
      - name: Exit if not need training
        if: env.NEED_TRAIN_RESULT == 'False'
        run: |
          echo "不需要训练，中断 workflow。"
          exit 1

      # 9. 删除旧模型文件
      - name: Delete old model pkl
        run: |
          echo "删掉旧模型"
          rm -f ./model_pkl/*.tar.gz
          git add -u

      # 10. 运行训练脚本
      - name: Run Train
        run: |
          echo "开始训练"
          cd ./roll && python ../script/run.py

      # 11. 列出模型（可选）
      - name: LS model
        run: |
          echo "当前模型列表："
          cd ./roll && python ./roll.py model ls all=1

      # 12. 压缩模型
      - name: Compress model
        run: |
          echo "压缩模型文件"
          cd ./roll && python ./roll.py model compress_mlruns

      # 13. 提交并推送模型文件
      - name: Commit and push model files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add model_pkl/*.tar.gz
          git commit -m "Auto-update trained models $(date +'%Y-%m-%d') [skip ci]" || echo "No changes to commit"
          git pull --rebase origin main
          git push

      # 14. 获取当前日期（用于 Release）
      - name: Get current date
        run: echo "CURRENT_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      # 15. 创建 Release 并上传模型压缩包
      - name: Create Release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "model-release-${{ env.CURRENT_DATE }}-${{ github.run_id }}"
          name: "Model Release ${{ env.CURRENT_DATE }}"
          body: |
            自动训练模型发布
            - 训练日期: ${{ env.CURRENT_DATE }}
            - 任务 ID: ${{ github.run_id }}
            - 触发方式: ${{ github.event_name }}
          files: |
            model_pkl/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
