name: Train model

permissions:
  contents: write

concurrency:
  group: train-model
  cancel-in-progress: false

on:
  schedule:
    - cron: '5 7 * * *'      # UTC 7:05 → 北京时间 15:05
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # --- 这是核心改动：直接从GitHub下载预打包数据 ---
      - name: Cache Qlib data
        id: cache-qlib-data
        uses: actions/cache@v4
        with:
          path: |
            ~/.qlib
            ~/.cache/qlib
          key: qlib-data-v1-${{ runner.os }}

      - name: Download Qlib data
        if: steps.cache-qlib-data.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.qlib/qlib_data/cn_data
          # 使用wget下载一个公开的数据包
          wget https://github.com/chenditc/investment_data/releases/download/2024-05-23/qlib_data_cn_1d_latest.tar.gz -O /tmp/qlib_data.tar.gz
          tar -xzvf /tmp/qlib_data.tar.gz -C ~/.qlib/qlib_data/cn_data

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
          else
            pip install pyqlib
          fi

      - name: Check if need to train
        id: need_train_check
        run: |
          echo "检查是否需要训练"
          cd ./roll && python ./roll.py train need_train > ../need_train_result.txt
          cd ..
          NEED_TRAIN=$(tail -n1 need_train_result.txt)
          echo "NEED_TRAIN_RESULT=$NEED_TRAIN" >> $GITHUB_ENV

      - name: Exit if not need training
        if: env.NEED_TRAIN_RESULT == 'False'
        run: |
          echo "不需要训练，中断 workflow。"
          exit 0

      - name: Delete old model pkl
        run: |
          echo "删掉旧模型"
          rm -f ./model_pkl/*.tar.gz
          git add -u

      - name: Run Train
        run: |
          echo "开始训练"
          cd ./roll && python ../script/run.py

      - name: LS model
        run: |
          echo "当前模型列表："
          cd ./roll && python ./roll.py model ls all=1

      - name: Compress model
        run: |
          echo "压缩模型文件"
          cd ./roll && python ./roll.py model compress_mlruns

      - name: Commit and push model files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add model_pkl/*.tar.gz
          git commit -m "Auto-update trained models $(date +'%Y-%m-%d') [skip ci]" || echo "No changes to commit"
          git pull --rebase origin main
          git push

      - name: Get current date
        run: echo "CURRENT_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Create Release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "model-release-${{ env.CURRENT_DATE }}-${{ github.run_id }}"
          name: "Model Release ${{ env.CURRENT_DATE }}"
          body: |
            自动训练模型发布
            - 训练日期: ${{ env.CURRENT_DATE }}
            - 任务 ID: ${{ github.run_id }}
            - 触发方式: ${{ github.event_name }}
          files: |
            model_pkl/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
