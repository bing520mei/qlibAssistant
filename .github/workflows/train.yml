name: Train model

permissions:
  contents: write

concurrency:
  group: train-model
  cancel-in-progress: false

on:
  schedule:
    - cron: '5 7 * * *'
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache Qlib data
        id: cache-qlib-data
        uses: actions/cache@v4
        with:
          path: |
            ~/.qlib
            ~/.cache/qlib
          key: qlib-data-v1-${{ runner.os }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas qlib
          if [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
          fi

      - name: Download Qlib data from Yahoo Finance
        if: steps.cache-qlib-data.outputs.cache-hit != 'true'
        run: |
          python -c "
          import qlib
          from qlib.data import D
          from qlib.data.dataset_handler import YahooFinanceHandler
          
          # 初始化Qlib，设置数据目录
          qlib.init(provider_uri='~/.qlib/qlib_data/cn_data')
          
          # 下载数据（这里以下载沪深300为例）
          # 注意：Yahoo Finance的ticker需要后缀.SS或.SZ
          symbols = ['000300.SS']  # 沪深300指数，实际应下载成分股
          D.download_data(
              '~/.qlib/qlib_data/cn_data',
              symbols=symbols,
              handler=YahooFinanceHandler,
              handler_kwargs={
                  'start_time': '2015-01-01',
                  'end_time': '2026-04-07',
                  'freq': 'day'
              }
          )
          print('数据下载完成')
          "

      - name: Check if need to train
        id: need_train_check
        run: |
          echo "检查是否需要训练"
          cd ./roll && python ./roll.py train need_train > ../need_train_result.txt
          cd ..
          NEED_TRAIN=$(tail -n1 need_train_result.txt)
          echo "NEED_TRAIN_RESULT=$NEED_TRAIN" >> $GITHUB_ENV

      - name: Exit if not need training
        if: env.NEED_TRAIN_RESULT == 'False'
        run: |
          echo "不需要训练，中断 workflow。"
          exit 0

      - name: Delete old model pkl
        run: |
          echo "删掉旧模型"
          rm -f ./model_pkl/*.tar.gz
          git add -u

      - name: Run Train
        run: |
          echo "开始训练"
          cd ./roll && python ../script/run.py

      - name: LS model
        run: |
          echo "当前模型列表："
          cd ./roll && python ./roll.py model ls all=1

      - name: Compress model
        run: |
          echo "压缩模型文件"
          cd ./roll && python ./roll.py model compress_mlruns

      - name: Commit and push model files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add model_pkl/*.tar.gz
          git commit -m "Auto-update trained models $(date +'%Y-%m-%d') [skip ci]" || echo "No changes to commit"
          git pull --rebase origin main
          git push

      - name: Get current date
        run: echo "CURRENT_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Create Release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "model-release-${{ env.CURRENT_DATE }}-${{ github.run_id }}"
          name: "Model Release ${{ env.CURRENT_DATE }}"
          body: |
            自动训练模型发布
            - 训练日期: ${{ env.CURRENT_DATE }}
            - 任务 ID: ${{ github.run_id }}
            - 触发方式: ${{ github.event_name }}
          files: |
            model_pkl/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
